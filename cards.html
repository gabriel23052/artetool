<!DOCTYPE html>
<html lang="pr-br">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon/favicon.png" type="image/png">
  <title>Cresol - Gerador de Cartões</title>
</head>

<body>
  <div class="modal-bg" data-selector="modal">
    <div class="modal">
      <img data-selector="img" src="" alt="">
      <button class="backButton largeText b3" data-selector="backBtn">Fechar</button>
      <a class="downloadButton largeText e4" data-selector="downBtn">Download</a>
    </div>
  </div>

  <img class="logo" src="svg/logo.svg" alt="Logo Cresol">

  <form class="form" action="./">
    <h1 class="largeText e1">Gerador de Cartões</h1>
    <label class="label e2" for="name">Nome</label>
    <input class="input b3" data-selector="nameInput" type="name" name="name" id="name" autocomplete="off" maxlength="25">
    <label class="label e2" for="model">Modelo</label>
    <div>
      <select class="input b3" data-selector="select" name="model" id="model">
      </select>
    </div>
    <button class="largeText b6" data-selector="genBtn">Gerar Cartão</button>
  </form>

  <script type="module" src="src/main.ts"></script>
</body>

</html>
