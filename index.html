<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Gerador de artes" />
  <link rel="manifest" href="/favicon/site.webmanifest" />
  <link rel="stylesheet" href="/src/main.css">
  <title>Criador de Artes</title>
</head>

<body>
  <main>

    <div class="modal-bg" data-selector="modal">
      <div class="modal neutral-bg1">
        <img data-selector="img" src="" alt="">
        <button class="backButton largeText neutral-bg2 neutral-tx1" data-selector="backBtn">FECHAR</button>
        <a class="downloadButton largeText primary-bg neutral-inv-tx0" data-selector="downBtn">DOWNLOAD</a>
      </div>
    </div>

    <img class="logo" src="svg/logo.svg" alt="Logo Cresol">

    <div class="form">
      <h1 class="title t-title neutral-tx0">Criador de Artes</h1>
      <p class="description t-paragraph neutral-tx1">Crie artes personalizadas para a equipe</p>
      <form action="./">
        <label class="t-label neutral-tx1" for="name">Nome</label>
        <input class="t-input neutral-bg0 neutral-tx0" type="name" name="name" id="name" autocomplete="off" maxlength="25" data-selector="nameInput">
        <label class="t-label neutral-tx1" for="model">Modelo</label>
        <div>
          <select class="t-input neutral-bg0 neutral-tx0" data-selector="select" name="model" id="model">
          </select>
        </div>
        <button class="t-buttonLabel neutral-bg2 neutral-tx2" data-selector="genBtn">CRIAR</button>
      </form>
    </div>

    <footer class="credits">
      <p class="t-paragraph neutral-tx1">Desenvolvido por Gabriel G. Pereira</p>
    </footer>

  </main>

  <script type="module" src="src/main.ts"></script>
</body>

</html>
